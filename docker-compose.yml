services:

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: school_api
    ports:
      - "8000:8000"
    volumes:
      - db_data:/app/database
    restart: unless-stopped

  spa:
    build:
      context: .
      dockerfile: Dockerfile.spa
    container_name: school_spa
    ports:
      - "8080:8080"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL}
      API_BASE_URL: http://api:8000
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
    depends_on:
      - api
    restart: unless-stopped

volumes:
  db_data:
